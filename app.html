<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ME Consultora — CRM Interno</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
/* ── RESET ── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1b2340; --gold:#c9a96e; --cream:#faf9f7; --bg:#f0ede8;
  --white:#fff; --muted:#8a8a8a; --border:#e5e0d8; --err:#dc2626;
  --shadow:0 1px 3px rgba(0,0,0,.08); --shadow-md:0 4px 8px rgba(0,0,0,.1);
  --shadow-lg:0 10px 20px rgba(0,0,0,.12); --radius:10px; --panel-w:75vw;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--navy);min-height:100vh}
button{font-family:'DM Sans',sans-serif;cursor:pointer}
input,textarea,select{font-family:'DM Sans',sans-serif}
.serif{font-family:'Playfair Display',serif}
a{color:inherit;text-decoration:none}

/* ── LOGIN ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--navy)}
.login-card{background:var(--white);border-radius:16px;padding:48px 40px;width:100%;max-width:360px;box-shadow:var(--shadow-lg);border-top:4px solid var(--gold)}
.login-logo{font-family:'Playfair Display',serif;font-size:1.7rem;color:var(--navy);font-weight:700;margin-bottom:5px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:32px;letter-spacing:.2px}
.login-label{font-size:12px;font-weight:600;color:var(--navy);margin-bottom:6px;display:block}
.login-input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;margin-bottom:16px;outline:none;transition:border-color .15s}
.login-input:focus{border-color:var(--navy)}
.login-btn{width:100%;background:var(--navy);color:white;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:600;margin-top:8px;transition:opacity .15s}
.login-btn:hover{opacity:.85}
.login-err{color:var(--err);font-size:12px;margin-top:8px;text-align:center;display:none}

/* ── APP LAYOUT ── */
#app-screen{display:none;flex-direction:column;height:100vh;overflow:hidden}

/* ── HEADER ── */
.app-header{background:var(--navy);color:white;padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:100}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hdr-logo{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700}
.hdr-sep{color:rgba(255,255,255,.3)}
.hdr-label{font-size:11px;color:rgba(255,255,255,.55);font-weight:500;letter-spacing:.6px;text-transform:uppercase}
.hdr-right{display:flex;align-items:center;gap:10px}
.btn-import{background:var(--gold);color:var(--navy);border:none;border-radius:7px;padding:7px 16px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px;transition:opacity .15s}
.btn-import:hover{opacity:.85}
.btn-import:disabled{opacity:.55;cursor:default}
.btn-logout{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.65);border-radius:7px;padding:6px 14px;font-size:12px;transition:all .15s}
.btn-logout:hover{border-color:rgba(255,255,255,.5);color:white}
.import-status{font-size:12px;color:rgba(255,255,255,.5)}

/* ── BOARD ── */
.board-wrapper{flex:1;overflow:hidden;display:flex;flex-direction:column}
.board-scroll{flex:1;overflow-x:auto;overflow-y:hidden;display:flex;gap:10px;padding:14px 24px;align-items:flex-start}
.board-scroll::-webkit-scrollbar{height:6px}
.board-scroll::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:3px}

/* ── COLUMN ── */
.k-col{flex-shrink:0;width:300px;display:flex;flex-direction:column;background:var(--white);border-radius:var(--radius);border:1.5px solid var(--border);max-height:calc(100vh - 82px);transition:border-color .15s}
.k-col.drag-over{border-color:var(--gold);background:#fffcf5}
.col-hdr{padding:11px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.col-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.col-name{font-size:12px;font-weight:600;letter-spacing:.2px;margin-left:7px}
.col-count{background:var(--bg);border-radius:20px;padding:2px 8px;font-size:11px;font-weight:600;color:var(--muted)}
.col-cards{flex:1;overflow-y:auto;padding:7px;display:flex;flex-direction:column;gap:6px;min-height:50px}
.col-cards::-webkit-scrollbar{width:3px}
.col-cards::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:2px}
.col-empty{text-align:center;padding:20px 8px;font-size:11px;color:var(--muted);border:1.5px dashed var(--border);border-radius:7px}

/* ── CARD ── */
.k-card{background:var(--cream);border:1px solid var(--border);border-left:3px solid transparent;border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .15s;user-select:none;position:relative}
.k-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);border-left-color:var(--gold)}
.k-card.dragging{opacity:.35;transform:rotate(1.5deg)}
.k-card.active-card{border-left-color:var(--navy);box-shadow:0 0 0 2px rgba(27,35,64,.1)}
.card-co{font-family:'Playfair Display',serif;font-size:13.5px;font-weight:700;color:var(--navy);line-height:1.2;margin-bottom:3px}
.card-nm{font-size:12px;color:var(--muted);margin-bottom:9px}
.card-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.card-score{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
.card-ind{font-size:10px;color:var(--muted);background:var(--bg);padding:2px 7px;border-radius:20px}
.card-prob{font-size:11px;color:#555;margin-top:7px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-style:italic}
.card-date{font-size:10px;color:var(--muted);margin-top:5px;text-align:right}

/* ── PANEL ── */
.panel-backdrop{position:fixed;inset:0;background:rgba(27,35,64,.22);z-index:200;opacity:0;pointer-events:none;transition:opacity .2s}
.panel-backdrop.open{opacity:1;pointer-events:auto}
.side-panel{position:fixed;top:0;right:0;bottom:0;width:var(--panel-w);background:var(--cream);box-shadow:-4px 0 28px rgba(0,0,0,.14);z-index:201;transform:translateX(100%);transition:transform .25s ease;display:flex;flex-direction:column}
.side-panel.open{transform:translateX(0)}
.panel-hdr{padding:16px 18px;border-bottom:2px solid var(--border);background:var(--white);flex-shrink:0;border-top:3px solid var(--gold)}
.panel-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.panel-avatar{width:40px;height:40px;border-radius:50%;background:var(--navy);color:white;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.panel-info{flex:1;margin-left:12px}
.panel-co{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--navy);line-height:1.2}
.panel-nm{font-size:12px;color:var(--muted);margin-top:3px}
.panel-close{background:none;border:none;font-size:18px;color:var(--muted);padding:2px;line-height:1;transition:color .15s;flex-shrink:0}
.panel-close:hover{color:var(--navy)}
.panel-badges{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.badge-ind{font-size:11px;color:var(--muted);background:var(--bg);padding:3px 8px;border-radius:20px}
.stage-sel-label{font-size:11px;color:var(--muted);margin-bottom:6px}
.stage-btns{display:flex;flex-wrap:wrap;gap:5px}
.sbtn{font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;border:1.5px solid var(--border);background:white;color:var(--muted);transition:all .15s}
.sbtn:hover{border-color:var(--navy);color:var(--navy)}
.sbtn.current{color:white;border-color:transparent;opacity:1}

/* ── TABS ── */
.panel-tabs{display:flex;border-bottom:1.5px solid var(--border);background:var(--white);flex-shrink:0}
.tab{flex:1;padding:10px 4px;font-size:12px;font-weight:500;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);transition:all .15s;margin-bottom:-1.5px;white-space:nowrap;letter-spacing:.2px}
.tab.on{color:var(--navy);border-bottom-color:var(--gold);font-weight:700}
.panel-body{flex:1;overflow-y:auto;padding:20px}
.panel-body::-webkit-scrollbar{width:4px}
.panel-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:2px}

/* ── BUDGET CALCULATOR ── */
.calc-grid{display:grid;grid-template-columns:1fr 64px 28px;gap:7px 8px;align-items:center;margin-bottom:14px}
.calc-lbl{font-size:12px;color:var(--navy)}
.calc-inp{width:100%;border:1.5px solid var(--border);border-radius:6px;padding:5px 8px;font-size:13px;font-weight:600;text-align:center;outline:none;background:white;transition:border-color .15s}
.calc-inp:focus{border-color:var(--navy)}
.calc-unit{font-size:12px;color:var(--muted)}
.calc-total-row{background:var(--navy);color:white;border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:12px}
.calc-total-price{font-size:16px;font-weight:700}
/* ── INDIVIDUAL COPILOT ITEMS ── */
.cop-item{background:white;border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:7px;display:flex;align-items:flex-start;gap:10px}
.cop-item-num{font-size:13px;font-weight:700;color:var(--gold);min-width:20px;margin-top:1px}
.cop-item-text{flex:1;font-size:13px;line-height:1.72;color:var(--navy);text-align:justify}
.btn-regen-item{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 9px;font-size:12px;color:var(--muted);flex-shrink:0;transition:all .15s;margin-top:1px}
.btn-regen-item:hover{border-color:var(--navy);color:var(--navy)}
.btn-regen-item:disabled{opacity:.4;cursor:default}
.pq-dim-group{margin-bottom:14px}
.pq-dim-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px;padding:4px 8px;border-radius:4px;background:rgba(0,0,0,.04);display:inline-block}

/* ── STAGE SUBTABS ── */
.stage-tabs{display:flex;gap:0;border-bottom:1.5px solid var(--border);margin-bottom:18px;background:var(--bg);border-radius:8px 8px 0 0;overflow:hidden}
.stab{flex:1;padding:9px 4px;font-size:11px;font-weight:500;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);transition:all .15s;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:-1.5px}
.stab.done{color:var(--navy);opacity:.7}
.stab.done:hover{opacity:1;border-bottom-color:rgba(27,35,64,.3)}
.stab.active{color:var(--navy);font-weight:700;border-bottom-color:var(--navy);background:var(--white)}
.stab.locked{opacity:.3;cursor:default}
/* ── CLICKABLE DIMS ── */
.dim-wrap{cursor:pointer;border-radius:6px;padding:4px 6px;margin:-4px -6px;transition:background .15s}
.dim-wrap:hover{background:rgba(0,0,0,.04)}
.dim-detail{display:none;font-size:11px;color:var(--muted);margin-top:4px;margin-left:104px;line-height:1.55;font-style:italic;padding-right:40px}
.dim-detail.open{display:block}
/* ── SAVE BTN ── */
.btn-save-session{background:none;border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.8);border-radius:7px;padding:6px 14px;font-size:12px;transition:all .15s}
.btn-save-session:hover{border-color:rgba(255,255,255,.6);color:white}
.btn-save-session.dirty{border-color:var(--gold);color:var(--gold)}
.btn-save-session:disabled{opacity:.5;cursor:default}

/* ── RESUMEN TAB ── */
.sec{margin-bottom:26px}
.sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gold);margin-bottom:12px;padding-bottom:7px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;gap:7px}
.sec-title::before{content:'';display:inline-block;width:3px;height:12px;background:var(--gold);border-radius:2px;flex-shrink:0}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.iitem{} .iitem.full{grid-column:1/-1}
.iitem label{font-size:10px;color:var(--muted);display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.7px;font-weight:600}
.iitem span{font-size:13px;font-weight:500;word-break:break-word;color:var(--navy);line-height:1.5}
.dim-bars{display:flex;flex-direction:column;gap:10px}
.dim-row{display:flex;align-items:center;gap:8px}
.dim-lbl{font-size:11px;font-weight:600;width:96px;flex-shrink:0;color:var(--navy)}
.dim-track{flex:1;height:7px;background:var(--bg);border-radius:4px;overflow:hidden}
.dim-fill{height:100%;border-radius:4px;width:0;transition:width .7s cubic-bezier(.4,0,.2,1)}
.dim-num{font-size:11px;font-weight:700;width:28px;text-align:right;color:var(--navy)}
.resumen-box{background:white;border:1px solid var(--border);border-left:3px solid var(--navy);border-radius:0 8px 8px 0;padding:14px 16px;font-size:13px;line-height:1.8;color:#444;text-align:justify}
.prob-box{background:linear-gradient(135deg,#fffdf5,#fff8e1);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:14px 16px;font-size:13px;line-height:1.75;color:#5a4200;font-style:italic;text-align:justify}
.palanca-box{background:white;border:1px solid var(--border);border-top:3px solid var(--gold);border-radius:0 0 8px 8px;padding:14px 16px}
.palanca-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--navy);margin-bottom:6px;line-height:1.3}
.palanca-desc{font-size:13px;color:#555;line-height:1.75;text-align:justify}

/* ── COPILOT TAB ── */
.cop-intro{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:16px;padding:11px 14px;background:white;border-radius:8px;border:1px solid var(--border);border-left:3px solid var(--navy);border-radius:0 8px 8px 0;text-align:justify}
.cop-action{background:white;border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;transition:box-shadow .15s}
.cop-action:hover{box-shadow:var(--shadow-md)}
.cop-action-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;background:linear-gradient(to right,var(--white),var(--cream))}
.cop-action-title{display:flex;align-items:flex-start;gap:10px;flex:1}
.cop-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.cop-title-text strong{font-size:13.5px;font-weight:700;display:block;margin-bottom:2px;color:var(--navy)}
.cop-title-text span{font-size:11px;color:var(--muted)}
.btn-gen{background:var(--navy);color:white;border:none;border-radius:7px;padding:7px 16px;font-size:12px;font-weight:600;white-space:nowrap;flex-shrink:0;transition:all .15s;letter-spacing:.2px}
.btn-gen:hover{opacity:.85;background:#232d55}
.btn-gen:disabled{opacity:.5;cursor:default}
.cop-result{border-top:1px solid var(--border);padding:14px;background:var(--cream)}
.cop-result-text{background:var(--white);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:14px 16px;font-size:12.5px;line-height:1.85;color:#333;white-space:pre-wrap;margin-bottom:10px;text-align:justify}
.result-btns{display:flex;gap:8px;flex-wrap:wrap}
.btn-copy{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:11px;color:var(--muted);transition:all .15s}
.btn-copy:hover{border-color:var(--navy);color:var(--navy)}
.btn-doc{background:none;border:1px solid var(--gold);border-radius:6px;padding:5px 12px;font-size:11px;color:#8a5c00;transition:all .15s}
.btn-doc:hover{background:var(--gold);color:var(--navy)}
.cop-locked{text-align:center;padding:40px 20px}
.cop-locked-icon{font-size:36px;margin-bottom:12px}
.cop-locked h3{font-size:14px;font-weight:600;margin-bottom:8px}
.cop-locked p{font-size:13px;color:var(--muted);line-height:1.65}
.transcript-textarea{width:100%;min-height:120px;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:12px;line-height:1.65;font-family:inherit;resize:vertical;box-sizing:border-box;color:#333}
.transcript-textarea:focus{outline:none;border-color:var(--navy)}
.transcript-ok{font-size:11px;font-weight:600;color:#2e7d32;background:#e8f5e9;padding:3px 10px;border-radius:20px;flex-shrink:0}
.prediag-locked-msg{background:#fff8e1;border-left:3px solid var(--gold);border-radius:0 6px 6px 0;padding:8px 12px;font-size:12px;color:#7a5200;margin:0 14px 2px}

/* ── DOCS TAB ── */
.docs-sec{margin-bottom:24px}
.docs-sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gold);margin-bottom:10px;padding-bottom:7px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;gap:7px}
.docs-sec-title::before{content:'';display:inline-block;width:3px;height:12px;background:var(--gold);border-radius:2px;flex-shrink:0}
.notes-area{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:12px 14px;font-size:13px;line-height:1.75;resize:vertical;min-height:120px;background:white;outline:none;transition:border-color .15s;color:var(--navy)}
.notes-area:focus{border-color:var(--navy)}
.btn-save{background:var(--navy);color:white;border:none;border-radius:7px;padding:8px 18px;font-size:12px;font-weight:600;margin-top:8px;transition:opacity .15s}
.btn-save:hover{opacity:.85}
.saved-ok{font-size:11px;color:#16a34a;margin-top:5px;display:none}
.links-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.link-item{display:flex;align-items:center;gap:8px;background:white;border:1px solid var(--border);border-radius:7px;padding:8px 10px}
.link-lbl{font-size:11px;color:var(--muted);min-width:70px;flex-shrink:0}
.link-url{font-size:12px;color:#2563eb;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.link-url:hover{text-decoration:underline}
.btn-rm{background:none;border:none;color:var(--muted);font-size:14px;padding:2px;line-height:1;flex-shrink:0}
.btn-rm:hover{color:var(--err)}
.link-add-row{display:flex;gap:6px}
.link-inp{flex:1;border:1.5px solid var(--border);border-radius:7px;padding:7px 10px;font-size:12px;outline:none;background:white;transition:border-color .15s}
.link-inp:focus{border-color:var(--navy)}
.btn-add{background:none;border:1.5px solid var(--border);border-radius:7px;padding:7px 12px;font-size:12px;font-weight:600;color:var(--navy);white-space:nowrap;transition:all .15s}
.btn-add:hover{border-color:var(--navy);background:var(--cream)}
.transcript-item{background:white;border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px}
.tr-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.tr-label{font-size:11px;font-weight:600;color:var(--navy)}
.tr-date{font-size:10px;color:var(--muted)}
.tr-text{font-size:12px;color:#444;line-height:1.65;white-space:pre-wrap;max-height:120px;overflow:hidden;position:relative}
.tr-text.expanded{max-height:none}
.tr-expand{background:none;border:none;font-size:11px;color:var(--gold);margin-top:4px;padding:0;font-weight:600}
.btn-new-transcript{background:none;border:none;color:var(--navy);font-size:12px;font-weight:600;text-decoration:underline;text-underline-offset:3px;padding:0}

/* ── TRANSCRIPT MODAL ── */
#tr-modal{position:fixed;inset:0;background:rgba(27,35,64,.4);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
#tr-modal.open{display:flex}
.tr-modal-card{background:white;border-radius:12px;padding:28px;width:100%;max-width:520px;box-shadow:var(--shadow-lg)}
.tr-modal-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:16px}
.tr-modal-row{margin-bottom:12px}
.tr-modal-row label{font-size:12px;font-weight:600;color:var(--navy);display:block;margin-bottom:5px}
.tr-modal-row input{width:100%;border:1.5px solid var(--border);border-radius:7px;padding:8px 12px;font-size:13px;outline:none}
.tr-modal-row input:focus{border-color:var(--navy)}
.tr-modal-row textarea{width:100%;border:1.5px solid var(--border);border-radius:7px;padding:8px 12px;font-size:13px;line-height:1.65;resize:vertical;min-height:160px;outline:none}
.tr-modal-row textarea:focus{border-color:var(--navy)}
.tr-modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
.btn-cancel{background:none;border:1.5px solid var(--border);border-radius:7px;padding:8px 18px;font-size:13px;color:var(--muted)}
.btn-cancel:hover{border-color:var(--muted)}
.btn-confirm{background:var(--navy);color:white;border:none;border-radius:7px;padding:8px 20px;font-size:13px;font-weight:600}

.reuniones-ph-icon{font-size:36px;margin-bottom:12px}
.reuniones-ph h3{font-size:14px;font-weight:600;margin-bottom:8px}
.reuniones-ph p{font-size:13px;color:var(--muted);line-height:1.65}
.reuniones-tip{margin-top:20px;background:white;border:1px solid var(--border);border-radius:8px;padding:12px 14px;text-align:left}

@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:white;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:9999;box-shadow:var(--shadow-lg);opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
</style>

<body>

<!-- ── LOGIN ── -->

  <div class="login-card">
    <div class="login-logo serif">ME Consultora</div>
    <div class="login-sub">Panel interno · Acceso restringido</div>

      <span class="hdr-logo serif">ME Consultora</span>
      <span class="hdr-sep">·</span>
      <span class="hdr-label">CRM Interno</span>

    <div class="hdr-right">

</div>

  <div class="tr-modal-card">
    <div class="tr-modal-title">Agregar transcript de reunión</div>
    <div class="tr-modal-row">
      <label>Nombre de la reunión</label>

    </div>
    <div class="tr-modal-btns">
      <button class="btn-cancel" onclick="closeTrModal()">Cancelar</button>
      <button class="btn-confirm" onclick="confirmTranscript()">Guardar</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<iframe id="apps-script-frame" name="apps-script-frame" style="display:none"></iframe>

<script>
// ══ CONFIG ══════════════════════════════════════════════════════════════════
const STAGES = [
  {id:1, name:'Test completado',     color:'#6b7280', bg:'#f3f4f6'},
  {id:2, name:'Sesión estratégica',  color:'#2563eb', bg:'#dbeafe'},
  {id:3, name:'Diagnóstico 360°',    color:'#b45309', bg:'#fef3c7'},
  {id:4, name:'Implementación',      color:'#16a34a', bg:'#dcfce7'},
  {id:5, name:'Partner estratégico', color:'#7c3aed', bg:'#ede9fe'},
  {id:6, name:'En pausa',            color:'#d97706', bg:'#fef9c3'},
  {id:7, name:'Perdido',             color:'#dc2626', bg:'#fee2e2'},
];
const DIMS = [
  {key:'finanzas',    label:'Finanzas',    color:'#2563eb'},
  {key:'operaciones', label:'Operaciones', color:'#16a34a'},
  {key:'gestion',     label:'Gestión',     color:'#7c3aed'},
  {key:'estrategia',  label:'Estrategia',  color:'#c9a96e'},
];
const COPILOT_ACTIONS = {
  2:[
    {id:'preguntas',   icon:'💬', title:'Preguntas para la sesión',     desc:'5 preguntas profundas para la reunión estratégica'},
    {id:'quickwins',   icon:'⚡', title:'Quick wins para llevar',       desc:'5 acciones concretas e inmediatas para el cliente'},
  ],
  3:[
    {id:'estructura',  icon:'🔍', title:'Estructura del diagnóstico',  desc:'Plan detallado del diagnóstico a realizar'},
    {id:'propuesta',   icon:'📋', title:'Propuesta de implementación', desc:'Borrador de propuesta para la stage siguiente'},
  ],
  4:[
    {id:'hitos',       icon:'📅', title:'Plan de hitos',              desc:'Cronograma con milestones del proyecto'},
    {id:'informe',     icon:'📊', title:'Informe de avance',          desc:'Template para reportar el progreso al cliente'},
  ],
  5:[
    {id:'mensual',     icon:'📈', title:'Resumen mensual',            desc:'Template de resultados del mes'},
    {id:'upsell',      icon:'🎯', title:'Oportunidades de upsell',    desc:'Análisis de expansión y próximos servicios'},
  ],
};

// ══ STATE ════════════════════════════════════════════════════════════════════
let S = {
  clients: {},    // email → normalized client obj
  crm: {},        // email → {stage, notes, links, transcripts, aiOutputs}
  active: null,   // active email
  tab: 'info',
  subtab: 'test', // active stage subtab inside Información
  drag: null,
  trModalEmail: null,
  dirty: false,   // unsaved changes flag
};

// ══ AUTH ═════════════════════════════════════════════════════════════════════
document.getElementById('l-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('l-user').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('l-pass').focus(); });

function doLogin() {
  const u = document.getElementById('l-user').value.trim();
  const p = document.getElementById('l-pass').value;
  if (u === 'melisa' && p === 'meconsulting2026') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'flex';
    loadStorage();
    renderBoard();
  } else {
    document.getElementById('l-err').style.display = 'block';
    document.getElementById('l-pass').value = '';
  }
}
function doLogout() {
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('l-user').value = '';
  document.getElementById('l-pass').value = '';
  closePanel();
}

// ══ STORAGE ══════════════════════════════════════════════════════════════════
function saveStorage() {
  try {
    localStorage.setItem('me_crm_cl', JSON.stringify(S.clients));
    localStorage.setItem('me_crm_data', JSON.stringify(S.crm));
  } catch(e){}
}
function loadStorage() {
  try {
    const c = localStorage.getItem('me_crm_cl');
    const d = localStorage.getItem('me_crm_data');
    if(c) S.clients = JSON.parse(c);
    if(d) S.crm     = JSON.parse(d);
  } catch(e){}
}

// ══ IMPORT ═══════════════════════════════════════════════════════════════════
async function importClients() {
  const btn  = document.getElementById('btn-import');
  const icon = document.getElementById('import-icon');
  const status = document.getElementById('import-status');
  btn.disabled = true;
  icon.innerHTML = '<span class="spinner"></span>';
  status.textContent = 'Importando...';

  try {
    // Fetch clients + CRM state in parallel
    status.textContent = 'Importando...';
    const [clientsRes, crmRes] = await Promise.all([
      fetch('/api/crm?action=clients'),
      fetch('/api/crm?action=getCRM')
    ]);
    const data    = await clientsRes.json();
    const crmData = await crmRes.json();
    if (!Array.isArray(data)) throw new Error(data.error || 'Respuesta inválida');

    // Load CRM state from sheet — index by BOTH clientId AND email for flexible lookup
    // When there are duplicates, keep the entry with most data (avoid overwriting with empty)
    const sheetCRM = {};
    const crmRichness = key => {
      const d = sheetCRM[key];
      if (!d) return -1;
      return Object.keys(d.aiOutputs || {}).length + (d.notes ? 1 : 0) + (d.stage > 1 ? 10 : 0);
    };
    const maybeStore = (key, parsed) => {
      if (!sheetCRM[key]) { sheetCRM[key] = parsed; return; }
      const newRich = Object.keys(parsed.aiOutputs || {}).length + (parsed.notes ? 1 : 0) + (parsed.stage > 1 ? 10 : 0);
      if (newRich >= crmRichness(key)) sheetCRM[key] = parsed;
    };
    if (Array.isArray(crmData)) {
      crmData.forEach(row => {
        const parsed = {
          stage:         parseInt(row.stage) || 1,
          stageAnterior: row.stageAnterior ? parseInt(row.stageAnterior) : null,
          notes:         row.notes || '',
          links:         tryParse(row.links, []),
          transcripts:   tryParse(row.transcripts, []),
          aiOutputs:     tryParse(row.aiOutputs, {}),
        };
        // Index by all possible keys for maximum compatibility
        if (row.clientId) maybeStore(String(row.clientId), parsed);
        if (row.email)    maybeStore(String(row.email),    parsed);
      });
    }

    let added = 0;
    data.forEach(raw => {
      const client = normalizeClient(raw);
      if (!client.email) return;
      const key = client.clientId || client.email;
      S.clients[key] = client;

      // Pick the richest sheet record (numeric key may be empty, email key may have full data)
      const richness = d => Object.keys((d||{}).aiOutputs||{}).length + ((d||{}).stage > 1 ? 10 : 0) + ((d||{}).notes ? 1 : 0);
      const candidates = [sheetCRM[key], sheetCRM[client.email]].filter(Boolean);
      const fromSheet = candidates.reduce((best, cur) => richness(cur) >= richness(best) ? cur : best, null);

      if (fromSheet) {
        const local = S.crm[key] || {};
        const sheetHasAI = fromSheet.aiOutputs && Object.keys(fromSheet.aiOutputs).length > 0;
        S.crm[key] = {
          ...fromSheet,
          aiOutputs: sheetHasAI ? fromSheet.aiOutputs : (local.aiOutputs || {}),
        };
      } else if (S.crm[client.email] && client.email !== key) {
        // Migrate from old email-only key
        S.crm[key] = S.crm[client.email];
        delete S.crm[client.email];
      } else if (!S.crm[key]) {
        S.crm[key] = blankCRM();
      }
      added++;
    });

    // Remove any legacy email|empresa keys now that we have numeric IDs
    Object.keys(S.clients).forEach(k => {
      if (k.includes('|') || (k.includes('@') && !Object.values(S.clients).some(c => c.clientId === k && c.email !== k))) {
        // If a numeric-keyed version of this client now exists, remove the old key
        const hasNumericKey = Object.keys(S.clients).some(k2 => /^\d+$/.test(k2) && S.clients[k2].email === (S.clients[k]?.email || ''));
        if (hasNumericKey) {
          delete S.clients[k];
          delete S.crm[k];
        }
      }
    });

    saveStorage();
    renderBoard();
    if (S.active) renderPanel(S.active);
    const txt = `${added} cliente${added!==1?'s':''} sincronizado${added!==1?'s':''}`;
    status.textContent = txt;
    showToast('✓ ' + txt);
    setTimeout(() => { status.textContent = ''; }, 5000);
  } catch(err) {
    console.error('Import error:', err);
    status.textContent = '';
    showToast('Error al importar: ' + err.message, true);
  }
  btn.disabled = false;
  icon.innerHTML = '⬇';
}

function parseArgDate(str) {
  if (!str) return null;
  const s = String(str).trim();
  const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m) {
    const a = parseInt(m[1]), b = parseInt(m[2]), y = parseInt(m[3]);
    // If first part > 12 it must be DD/MM (Argentine manual entry)
    // Otherwise Apps Script returns M/D/YYYY → treat as MM/DD
    if (a > 12) return new Date(y, b-1, a);
    return new Date(y, a-1, b);
  }
  const d = new Date(s);
  return isNaN(d.getTime()) ? null : d;
}

function normalizeClient(r) {
  const g = (...keys) => {
    for (const k of keys) {
      if (r[k] !== undefined && r[k] !== null && r[k] !== '') return r[k];
    }
    return '';
  };
  const emailVal   = String(g('Email','email') || '').toLowerCase().trim();
  const empresaVal = g('Empresa','empresa');
  // Use numeric ID from sheet as stable key; fallback to email if no ID yet
  const rawId    = g('ID','id');
  const clientId = rawId ? String(rawId) : emailVal;
  return {
    clientId,
    email:          emailVal,
    nombre:         g('Nombre','nombre'),
    empresa:        empresaVal,
    celular:        g('Celular','celular'),
    industria:      g('Industria','industria'),
    descripcion:    g('Descripción del negocio','Descripción','Descripcion','descripcion'),
    scoreTotal:     parseInt(g('Score Total','scoreTotal')) || 0,
    scoreFinanzas:  parseInt(g('Score Finanzas','scoreFinanzas')) || 0,
    scoreOps:       parseInt(g('Score Operaciones','scoreOperaciones')) || 0,
    scoreGestion:   parseInt(g('Score Gestión','Score Gestion','scoreGestion')) || 0,
    scoreEst:       parseInt(g('Score Estrategia','scoreEstrategia')) || 0,
    perfil:         g('Perfil','perfil'),
    resumen:        g('Diagnóstico resumen','Diagnóstico Resumen','Resumen Ejecutivo','resumen'),
    palancaTitulo:  g('Palanca — Título','Palanca — Titulo','Palanca Título','palancaTitulo'),
    palancaDesc:    g('Palanca — Descripción','Palanca — Descripcion','Palanca Descripción','palancaDesc'),
    fraseCierre:    g('Frase cierre','Frase Cierre','fraseCierre'),
    problemaAbierto:         g('Problema principal (pregunta abierta)','problemaAbierto'),
    preguntaDebilFinanzas:   g('Pregunta débil — Finanzas','preguntaDebilFinanzas'),
    preguntaDebilOps:        g('Pregunta débil — Operaciones','preguntaDebilOps'),
    preguntaDebilGestion:    g('Pregunta débil — Gestión','Pregunta débil — Gestion','preguntaDebilGestion'),
    preguntaDebilEstrategia: g('Pregunta débil — Estrategia','preguntaDebilEstrategia'),
    timestamp:               g('Fecha','Timestamp','timestamp'),
  };
}

function blankCRM() {
  return {stage:1, stageAnterior:null, notes:'', links:[], transcripts:[], aiOutputs:{}};
}

// ══ CRM HELPERS ═══════════════════════════════════════════════════════════════
function getCRM(id) {
  if (!S.crm[id]) {
    // Try to migrate from email-only key
    const cl = S.clients[id];
    if (cl && cl.email && cl.email !== id && S.crm[cl.email]) {
      S.crm[id] = S.crm[cl.email];
      delete S.crm[cl.email];
      saveStorage();
    } else {
      S.crm[id] = blankCRM();
    }
  }
  return S.crm[id];
}
function updateCRM(email, patch) {
  S.crm[email] = {...getCRM(email), ...patch};
  saveStorage();
  markDirty();
}
function markDirty() {
  S.dirty = true;
  const btn = document.getElementById('btn-save');
  if (btn) { btn.classList.add('dirty'); btn.textContent = 'Guardar sesión ●'; }
}
async function saveSession() {
  const btn = document.getElementById('btn-save');
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando...'; }
  try {
    // Only save clients that exist in S.clients (skip orphan CRM entries)
    const ids = Object.keys(S.clients);
    for (const id of ids) {
      const cl  = S.clients[id];
      const crm = getCRM(id);
      await fetch('/api/crm', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          action:   'updateCRM',
          email:    cl?.email || id,
          clientId: id,
          data:     crm,
        }),
      });
    }
    S.dirty = false;
    showToast('Sesión guardada ✓');
  } catch(e) {
    showToast('Error al guardar', true);
  }
  if (btn) { btn.disabled = false; btn.classList.remove('dirty'); btn.textContent = 'Guardar sesión'; }
}
function clearAiOutputs(email) {
  if (!confirm('¿Borrar todos los datos de sesión de este cliente? (preguntas, transcript, presupuesto)')) return;
  S.crm[email] = {...getCRM(email), aiOutputs: {}};
  saveStorage(); markDirty();
  openPanel(email);
  showToast('Datos de sesión eliminados ✓');
}

function moveStage(email, stageId) {
  const crm = getCRM(email);
  const patch = {stage: stageId};
  if (stageId === 6 || stageId === 7) patch.stageAnterior = crm.stage;
  updateCRM(email, patch);
  renderBoard();
  if (S.active === email) renderPanel(email);
}

// ══ RENDER BOARD ══════════════════════════════════════════════════════════════
function renderBoard() {
  document.getElementById('board').innerHTML =
    STAGES.map(st => renderColumn(st)).join('');
}

function renderColumn(st) {
  const emails = Object.keys(S.clients).filter(e => getCRM(e).stage === st.id);
  return `
  <div class="k-col" data-stage="${st.id}"
    ondragover="onDragOver(event,${st.id})"
    ondragleave="onDragLeave(event)"
    ondrop="onDrop(event,${st.id})">
    <div class="col-hdr">
      <div style="display:flex;align-items:center">
        <div class="col-dot" style="background:${st.color}"></div>
        <span class="col-name" style="color:${st.color}">${st.name}</span>
      </div>
      <span class="col-count">${emails.length}</span>
    </div>
    <div class="col-cards" data-stage="${st.id}">
      ${emails.length ? emails.map(e => renderCard(e, st)).join('') : '<div class="col-empty">Sin clientes</div>'}
    </div>
  </div>`;
}

function renderCard(email, st) {
  const cl = S.clients[email];
  const ss = scoreStyle(cl.scoreTotal);
  const isActive = S.active === email;
  const pd = parseArgDate(cl.timestamp);
  const ts = pd ? pd.toLocaleDateString('es-AR',{day:'2-digit',month:'short'}) : '';
  return `
  <div class="k-card${isActive?' active-card':''}"
    data-email="${email}" draggable="true"
    ondragstart="onDragStart(event,'${email}')"
    ondragend="onDragEnd(event)"
    onclick="openPanel('${email}')">
    <div class="card-co">${esc(cl.empresa||'Sin nombre')}</div>
    <div class="card-nm">${esc(cl.nombre)}</div>
    <div class="card-row">
      <span class="card-score" style="background:${ss.bg};color:${ss.color}">${cl.scoreTotal}/100</span>
      ${cl.industria ? `<span class="card-ind">${esc(cl.industria)}</span>` : ''}
    </div>
    ${cl.problemaAbierto ? `<div class="card-prob">"${esc(cl.problemaAbierto)}"</div>` : ''}
    ${ts ? `<div class="card-date">${ts}</div>` : ''}
  </div>`;
}

// ══ DRAG & DROP ═══════════════════════════════════════════════════════════════
function onDragStart(e, email) {
  S.drag = email;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => { const el = document.querySelector(`[data-email="${email}"]`); if(el) el.classList.add('dragging'); }, 0);
}
function onDragEnd(e) {
  document.querySelectorAll('.k-card.dragging').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.k-col.drag-over').forEach(el => el.classList.remove('drag-over'));
  S.drag = null;
}
function onDragOver(e, stageId) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const col = e.currentTarget;
  if (!col.classList.contains('drag-over')) {
    document.querySelectorAll('.k-col.drag-over').forEach(el => el.classList.remove('drag-over'));
    col.classList.add('drag-over');
  }
}
function onDragLeave(e) {
  if (!e.currentTarget.contains(e.relatedTarget)) e.currentTarget.classList.remove('drag-over');
}
function onDrop(e, stageId) {
  e.preventDefault();
  if (S.drag) moveStage(S.drag, stageId);
  document.querySelectorAll('.k-col.drag-over').forEach(el => el.classList.remove('drag-over'));
}

// ══ PANEL ════════════════════════════════════════════════════════════════════
function openPanel(email) {
  S.active = email;
  S.tab = 'info';
  const crm = getCRM(email);
  const effectiveStage = (crm.stage === 6 || crm.stage === 7) ? (crm.stageAnterior || 1) : crm.stage;
  S.subtab = ['test','sesion','diagnostico','implementacion','partner'][Math.min(effectiveStage,5)-1] || 'test';
  document.getElementById('panel-backdrop').classList.add('open');
  document.getElementById('side-panel').classList.add('open');
  renderPanel(email);
  renderBoard();
}
function closePanel() {
  S.active = null;
  document.getElementById('panel-backdrop').classList.remove('open');
  document.getElementById('side-panel').classList.remove('open');
  renderBoard();
}
function renderPanel(email) {
  const cl  = S.clients[email];
  if (!cl) return;
  const crm = getCRM(email);
  const st  = STAGES.find(s => s.id === crm.stage) || STAGES[0];
  const ss  = scoreStyle(cl.scoreTotal);
  const ini = initials(cl.empresa || cl.nombre);

  document.getElementById('panel-hdr').innerHTML = `
    <div class="panel-top">
      <div style="display:flex;align-items:flex-start;flex:1">
        <div class="panel-avatar" style="background:${st.color}">${ini}</div>
        <div class="panel-info">
          <div class="panel-co">${esc(cl.empresa||cl.nombre)}</div>

function switchTab(tabId, email) {
  S.tab = tabId;
  document.querySelectorAll('.tab').forEach(b => {
    const map = {info:'Información', docs:'Docs', reuniones:'Reuniones'};
    b.classList.toggle('on', b.textContent.trim() === map[tabId]);
  });
  renderTabContent(email);
}
function switchSubtab(subtabId, email) {
  S.subtab = subtabId;
  renderTabContent(email);
}

function renderTabContent(email) {
  const body = document.getElementById('panel-body');
  if (S.tab === 'info')      { body.innerHTML = renderInfo(email); if(S.subtab==='test') initDimBars(email); }
  if (S.tab === 'docs')      body.innerHTML = renderDocs(email);
  if (S.tab === 'reuniones') body.innerHTML = renderReuniones();
}

// ══ INFORMACIÓN TAB (stage subtabs) ══════════════════════════════════════════
const SUBTAB_STAGES = [
  {id:'test',          label:'Test',          stage:1},
  {id:'sesion',        label:'Sesión',        stage:2},
  {id:'diagnostico',   label:'Diagnóstico',   stage:3},
  {id:'implementacion',label:'Implementación',stage:4},
  {id:'partner',       label:'Partner',       stage:5},
];

function renderInfo(email) {
  const crm = getCRM(email);
  const effectiveStage = (crm.stage === 6 || crm.stage === 7) ? (crm.stageAnterior || 1) : crm.stage;

  const subtabs = SUBTAB_STAGES.map(st => {
    const isDone    = effectiveStage > st.stage;
    const isCurrent = effectiveStage === st.stage;
    const isLocked  = effectiveStage < st.stage;
    const isActive  = S.subtab === st.id;
    let cls = 'stab';
    if (isActive)     cls += ' active';
    else if (isDone)  cls += ' done';
    else if (isLocked)cls += ' locked';
    const label = isDone ? `${st.label} ✓` : isCurrent ? st.label : st.label;
    const click = isLocked ? '' : `onclick="switchSubtab('${st.id}','${email}')"`;
    return `<button class="${cls}" ${click}>${label}</button>`;
  }).join('');

  let content = '';
  if (S.subtab === 'test') {
    content = renderResumen(email);
  } else {
    const stageMap = {sesion:2, diagnostico:3, implementacion:4, partner:5};
    const stageId = stageMap[S.subtab];
    if (stageId && effectiveStage >= stageId) {
      content = renderCopilotForStage(email, stageId);
    } else {
      content = `<div style="text-align:center;padding:40px 20px;color:var(--muted);font-size:13px">Stage no disponible aún</div>`;
    }
  }

  return `
    <div class="stage-tabs">${subtabs}</div>
    ${content}
  `;
}

function renderCopilotForStage(email, stageId) {
  // Temporarily override crm.stage for renderCopilot
  const crm = getCRM(email);
  const origStage = crm.stage;
  crm.stage = stageId;
  const html = renderCopilot(email);
  crm.stage = origStage;
  return html;
}

function parseNumberedList(text) {
  const parts = text.split(/\n(?=\d+\.)/);
  return parts.map(p => p.replace(/^\d+\.\s*/, '').trim()).filter(Boolean);
}

const DIMS_COLORS = {Finanzas:'#1b5e20',Operaciones:'#0d47a1',Gestión:'#6a1b9a',Estrategia:'#b71c1c',General:'#555'};

function renderPreguntas(email) {
  const crm = getCRM(email);
  const raw = crm.aiOutputs?.preguntas || [];
  const isStructured = raw.length > 0 && typeof raw[0] === 'object';

  let innerHtml = '';
  if (raw.length) {
    if (isStructured) {
      const dimGroups = {};
      raw.forEach((item, i) => {
        const d = item.dim || 'General';
        if (!dimGroups[d]) dimGroups[d] = [];
        dimGroups[d].push({q: item.q, i});
      });
      innerHtml = DIMS_ORDER.map(dim => {
        const group = dimGroups[dim] || [];
        if (!group.length) return '';
        const color = DIMS_COLORS[dim] || '#333';
        let rows = group.map(function(g) {
          return '<div class="cop-item">' +
            '<div class="cop-item-text" id="pq-' + g.i + '">' + esc(g.q) + '</div>' +
            '<button class="btn-regen-item" id="brq-' + g.i + '" onclick="regenItem(\'' + email + '\',\'pregunta\',' + g.i + ')">↺</button>' +
            '</div>';
        }).join('');
        return '<div class="pq-dim-group"><div class="pq-dim-label" style="color:' + color + '">' + dim + '</div>' + rows + '</div>';
      }).join('');
    } else {
      innerHtml = '<div style="padding:4px 0 8px;font-size:12px;color:var(--muted);font-style:italic">Formato anterior — hacé clic en Regenerar para ver agrupadas por dimensión.</div>';
      innerHtml += raw.map(function(q, i) {
        const txt = (typeof q === 'object') ? q.q : q;
        return '<div class="cop-item">' +
          '<span class="cop-item-num">' + (i+1) + '.</span>' +
          '<div class="cop-item-text" id="pq-' + i + '">' + esc(txt) + '</div>' +
          '<button class="btn-regen-item" id="brq-' + i + '" onclick="regenItem(\'' + email + '\',\'pregunta\',' + i + ')">↺</button>' +
          '</div>';
      }).join('');
    }
  }

  return `

      <div class="cop-action-title">
        <span class="cop-icon">💬</span>

          <span>2 preguntas por dimensión — 8 en total</span>

        ${raw.length ? 'Regenerar todas' : 'Generar'}

    </div>
    ${raw.length
      ? '<div class="cop-result" id="cr-preguntas">' + innerHtml + '</div>'
      : '<div id="cr-preguntas" style="display:none"></div>'}
  </div>`;
}

async function generateAndCreatePresupuesto(email) {
  const cl  = S.clients[email];
  const crm = getCRM(email);
  const h = {
    entrevistas:  Number(document.getElementById('h-entrevistas')?.value)||8,
    analisis:     Number(document.getElementById('h-analisis')?.value)||10,
    informe:      Number(document.getElementById('h-informe')?.value)||8,
    presentacion: Number(document.getElementById('h-presentacion')?.value)||3,
  };
  const total = Object.values(h).reduce((a,b)=>a+b,0);
  const price = total * 40000;

  const btn = document.getElementById('bg-presupuesto');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Generando...';}

  try {
    // Paso 1: generar contenido con la IA
    const res = await fetch('/api/copilot', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        action: 'presupuesto', stage: 2,
        client: {
          nombre: cl.nombre, empresa: cl.empresa, industria: cl.industria,
          descripcion: cl.descripcion, scoreTotal: cl.scoreTotal,
          scoreFinanzas: cl.scoreFinanzas, scoreOps: cl.scoreOps,
          scoreGestion: cl.scoreGestion, scoreEst: cl.scoreEst,
          perfil: cl.perfil, problema: cl.problemaAbierto,
          resumen: cl.resumen, palancaTitulo: cl.palancaTitulo,
          palancaDesc: cl.palancaDesc,
          transcript: crm.aiOutputs?.transcript || '',
          price,
        }
      })
    });
    const data = await res.json();
    const content = data.result || '';
    if (!content) throw new Error('Sin contenido');

    // Guardar horas
    const ao = {...(crm.aiOutputs||{}), presupuesto_hours:h};
    S.crm[email] = {...getCRM(email), aiOutputs:ao};
    saveStorage();

    // Paso 2: crear la presentación directamente
    if(btn) btn.innerHTML = '<span class="spinner"></span> Creando presentación...';
    const empresa = cl.empresa || cl.nombre || email;
    const mes = new Date().toLocaleDateString('es-AR', {month:'long', year:'numeric'});
    const resSlides = await fetch('/api/crm', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        action: 'createSlides',
        title: `Propuesta Diagnóstico 360° — ${empresa} — ${mes}`,
        empresa, nombre: cl.nombre,
        actionId: 'presupuesto',
        content,
      })
    });
    const slideData = await resSlides.json();
    if (slideData.url) {
      window.open(slideData.url, '_blank');
      showToast('Presentación creada ✓');
    } else {
      throw new Error('Sin URL');
    }
  } catch(err) {
    showToast('Error al generar la presentación', true);
  } finally {
    if(btn){btn.disabled=false;btn.innerHTML='📊 Generar presentación';}
  }
}



async function regenItem(email, type, index) {
  const crm = getCRM(email);
  const cl = S.clients[email];
  const btnId = type==='pregunta' ? `brq-${index}` : `brqw-${index}`;
  const btn = document.getElementById(btnId);
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner dark"></span>';}
  const rawItems = [...(type==='pregunta' ? (crm.aiOutputs?.preguntas||[]) : (crm.aiOutputs?.quickwins||[]))];
  // For structured preguntas: pass flat text list, preserve dim info
  const isStructured = type==='pregunta' && rawItems.length > 0 && typeof rawItems[0] === 'object';
  const existingItems = isStructured ? rawItems.map(x => x.q) : rawItems;
  const currentDim   = isStructured ? (rawItems[index]?.dim || '') : '';
  try {
    const res = await fetch('/api/copilot',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        action: type==='pregunta' ? 'pregunta_individual' : 'quickwin_individual',
        stage: crm.stage, index, existingItems, currentDim,
        client:{nombre:cl.nombre,empresa:cl.empresa,industria:cl.industria,
          descripcion:cl.descripcion,scoreTotal:cl.scoreTotal,scoreFinanzas:cl.scoreFinanzas,
          scoreOps:cl.scoreOps,scoreGestion:cl.scoreGestion,scoreEst:cl.scoreEst,
          problema:cl.problemaAbierto,resumen:cl.resumen,palancaTitulo:cl.palancaTitulo,palancaDesc:cl.palancaDesc}
      })
    });
    const data = await res.json();
    const newQ = data.result?.trim() || existingItems[index];
    if (isStructured) {
      rawItems[index] = {...rawItems[index], q: newQ};
    } else {
      rawItems[index] = newQ;
    }
    const field = type==='pregunta' ? 'preguntas' : 'quickwins';
    const ao = {...(crm.aiOutputs||{}), [field]: rawItems};
    updateCRM(email, {aiOutputs:ao});
    const textEl = document.getElementById((type==='pregunta'?'pq-':'qw-')+index);
    if(textEl) textEl.textContent = newQ;
  } catch(err){ showToast('Error al regenerar',true); }
  if(btn){btn.disabled=false;btn.innerHTML='↺';}
}

  const stName = STAGES.find(s => s.id === crm.stage)?.name || '';

      ${renderQuickwins(email)}
      ${renderTranscriptSection(email)}
      ${renderPresupuestoCalc(email)}`;
  }

  // Stages 3-5: generic rendering
  const outputs = crm.aiOutputs || {};
  return `
    <div class="cop-intro">Herramientas IA para <strong>${stName}</strong>. Los resultados se guardan automáticamente en el perfil del cliente.</div>
    ${actions.map(a => {
      const saved = typeof outputs[a.id] === 'string' ? outputs[a.id] : '';
      return `
      <div class="cop-action" id="ca-${a.id}">
        <div class="cop-action-hdr">
          <div class="cop-action-title">
            <span class="cop-icon">${a.icon}</span>
            <div class="cop-title-text">
              <strong>${a.title}</strong>
              <span>${a.desc}</span>
            </div>
          </div>
          <button class="btn-gen" id="bg-${a.id}" onclick="runCopilot('${email}','${a.id}')">
            ${saved ? 'Regenerar' : 'Generar'}
          </button>
        </div>
        ${saved ? buildResultHTML(email, a.id, saved) : `<div id="cr-${a.id}" style="display:none"></div>`}
      </div>`;
    }).join('')}`;
}

function buildResultHTML(email, actionId, text) {
  const showDoc = (actionId === 'presupuesto' || actionId === 'propuesta');
  return `
    <div class="cop-result" id="cr-${actionId}">
      <div class="cop-result-text" id="crt-${actionId}">${esc(text)}</div>
      <div class="result-btns">
        <button class="btn-copy" onclick="copyResult('${actionId}')">📋 Copiar</button>
        ${showDoc ? `<button class="btn-doc" onclick="createDoc('${email}','${actionId}')">📝 Crear Google Doc</button>` : ''}
      </div>
    </div>`;
}

async function runCopilot(email, actionId) {
  const cl  = S.clients[email];
  const crm = getCRM(email);
  const btn = document.getElementById('bg-' + actionId);
  const div = document.getElementById('cr-' + actionId);

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';
  if (div) { div.style.display = 'none'; }

  try {
    const res  = await fetch('/api/copilot', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        action: actionId,
        stage:  crm.stage,
        client: {
          nombre:        cl.nombre,
          empresa:       cl.empresa,
          industria:     cl.industria,
          descripcion:   cl.descripcion,
          scoreTotal:    cl.scoreTotal,
          scoreFinanzas: cl.scoreFinanzas,
          scoreOps:      cl.scoreOps,
          scoreGestion:  cl.scoreGestion,
          scoreEst:      cl.scoreEst,
          perfil:        cl.perfil,
          problema:      cl.problemaAbierto,
          resumen:       cl.resumen,
          palancaTitulo: cl.palancaTitulo,
          palancaDesc:   cl.palancaDesc,
        }
      })
    });
    const data = await res.json();
    const result = data.result || 'Sin respuesta';

    // Special handling for structured preguntas
    if (actionId === 'preguntas') {
      // Parse format: "[Finanzas] Pregunta text"
      const items = [];
      result.split('\n').forEach(line => {
        const m = line.trim().match(/^\[(.+?)\]\s*(.+)$/);
        if (m) items.push({dim: m[1].trim(), q: m[2].trim()});
      });
      // Fallback: if nothing parsed, wrap as flat list
      if (!items.length) {
        parseNumberedList(result).forEach(q => items.push({dim:'General', q}));
      }
      const ao = {...(crm.aiOutputs||{}), preguntas: items};
      updateCRM(email, {aiOutputs: ao});
      renderTabContent(email);
      return;
    }
    if (actionId === 'quickwins') {
      const items = parseNumberedList(result);
      const ao = {...(crm.aiOutputs||{}), quickwins: items};
      updateCRM(email, {aiOutputs: ao});
      renderTabContent(email);
      return;
    }

    // Save to CRM
    const aiOutputs = {...(crm.aiOutputs||{}), [actionId]: result};
    updateCRM(email, {aiOutputs});

    // Display result
    // Re-render copilot to show result + proper button
    const container = document.getElementById('ca-' + actionId);
    if (container) {
      const newResult = buildResultHTML(email, actionId, result);
      let rd = document.getElementById('cr-' + actionId);
      if (rd) rd.outerHTML = newResult; else container.insertAdjacentHTML('beforeend', newResult);
    }
  } catch(err) {
    console.error('Copilot err:', err);
    showToast('Error al generar. Intentá de nuevo.', true);
  }

  const b2 = document.getElementById('bg-' + actionId);
  if (b2) { b2.disabled = false; b2.innerHTML = 'Regenerar'; }
}

function copyResult(actionId) {
  const el = document.getElementById('crt-' + actionId);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => showToast('Copiado al portapapeles'));
}

async function createDoc(email, actionId) {
  const cl  = S.clients[email];
  const crm = getCRM(email);
  const text = crm.aiOutputs?.[actionId] || crm.aiOutputs?.[actionId + '_text'] || '';
  if (!text) return showToast('Generá el contenido primero', true);

  // prediag y presupuesto → Google Slides, el resto → Google Doc
  const useSlides = ['prediag','presupuesto'].includes(actionId);
  const action    = useSlides ? 'createSlides' : 'createDoc';
  const label     = useSlides ? 'Presentación' : 'Google Doc';

  const empresa = cl?.empresa || cl?.nombre || email;
  const mes     = new Date().toLocaleDateString('es-AR', {month:'long', year:'numeric'});
  const titles  = {
    prediag:     `Pre-Diagnóstico 360° — ${empresa} — ${mes}`,
    presupuesto: `Propuesta Diagnóstico 360° — ${empresa} — ${mes}`,
  };
  const title = titles[actionId] || `${actionId} — ${empresa} — ${mes}`;

  // Para slides: quedarse solo con los primeros 5 bloques [SLIDE]
  // y cortar cualquier texto que el modelo agregue después del TYPE: de cada bloque
  let content = text;
  if (useSlides) {
    const parts = text.split('[SLIDE]');
    content = parts.slice(1, 6).map(block => {
      const lines = block.split('\n');
      const typeIdx = lines.findIndex(l => l.trim().startsWith('TYPE:'));
      const keep = typeIdx >= 0 ? lines.slice(0, typeIdx + 1) : lines;
      return '[SLIDE]\n' + keep.join('\n').trim();
    }).join('\n\n');
  }

  showToast(`Creando ${label.toLowerCase()}...`);
  try {
    const res  = await fetch('/api/crm', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ action, title, empresa, nombre: cl?.nombre, actionId, content })
    });
    const data = await res.json();
    if (data.url) {
      window.open(data.url, '_blank');
      showToast(`${label} creado ✓`);
    } else {
      showToast(`Error al crear ${label.toLowerCase()}`, true);
    }
  } catch(err) {
    showToast(`Error al crear ${label.toLowerCase()}`, true);
  }
}

// ══ DOCS TAB ═════════════════════════════════════════════════════════════════
function renderDocs(email) {
  const crm = getCRM(email);
  const links = crm.links || [];
  const transcripts = crm.transcripts || [];
  return `
  <div class="docs-sec">
    <div class="docs-sec-title">📝 Notas internas</div>
    <textarea class="notes-area" id="notes-area" placeholder="Anotá observaciones, contexto, ideas...">${esc(crm.notes||'')}</textarea>
    <button class="btn-save" onclick="saveNotes('${email}')">Guardar notas</button>
    <div class="saved-ok" id="notes-ok">✓ Guardado</div>
  </div>

  <div class="docs-sec">
    <div class="docs-sec-title">🔗 Links y documentos</div>
    <div class="links-list" id="links-list">
      ${links.map((l,i) => `
        <div class="link-item">
          <span class="link-lbl">${esc(l.label)}</span>
          <a class="link-url" href="${esc(l.url)}" target="_blank">${esc(l.url)}</a>
          <button class="btn-rm" onclick="removeLink('${email}',${i})">✕</button>
        </div>`).join('')}
    </div>
    <div class="link-add-row">
      <input class="link-inp" id="li-lbl" placeholder="Etiqueta" style="max-width:110px"/>
      <input class="link-inp" id="li-url" placeholder="https://..."/>
      <button class="btn-add" onclick="addLink('${email}')">+ Agregar</button>
    </div>
  </div>

  <div class="docs-sec">
    <div class="docs-sec-title">💬 Transcripts de reuniones</div>
    ${transcripts.map((t,i) => `
      <div class="transcript-item">
        <div class="tr-meta">
          <span class="tr-label">${esc(t.label)}</span>
          <span style="display:flex;align-items:center;gap:8px">
            <span class="tr-date">${esc(t.date)}</span>
            <button class="btn-rm" onclick="removeTranscript('${email}',${i})">✕</button>
          </span>
        </div>
        <div class="tr-text" id="tr-${i}">${esc(t.text)}</div>
        ${t.text.length > 300 ? `<button class="tr-expand" onclick="expandTr(${i})">Ver más</button>` : ''}
      </div>`).join('')}
    <button class="btn-new-transcript" onclick="openTrModal('${email}')">+ Agregar transcript de reunión</button>
  </div>`;
}

function saveNotes(email) {
  const val = document.getElementById('notes-area')?.value || '';
  updateCRM(email, {notes: val});
  const ok = document.getElementById('notes-ok');
  if (ok) { ok.style.display = 'block'; setTimeout(() => ok.style.display = 'none', 2500); }
}

function addLink(email) {
  const url = document.getElementById('li-url')?.value.trim() || '';
  const lbl = document.getElementById('li-lbl')?.value.trim() || 'Link';
  if (!url) return;
  const crm   = getCRM(email);
  const links = [...(crm.links||[]), {url, label: lbl}];
  updateCRM(email, {links});
  renderTabContent(email);
}

function removeLink(email, index) {
  const crm   = getCRM(email);
  const links = (crm.links||[]).filter((_,i) => i !== index);
  updateCRM(email, {links});
  renderTabContent(email);
}

function expandTr(i) {
  const el = document.getElementById('tr-' + i);
  if (el) { el.classList.toggle('expanded'); }
}

function openTrModal(email) {
  S.trModalEmail = email;
  document.getElementById('tr-label-inp').value = '';
  document.getElementById('tr-text-inp').value  = '';
  document.getElementById('tr-modal').classList.add('open');
}
function closeTrModal() {
  document.getElementById('tr-modal').classList.remove('open');
  S.trModalEmail = null;
}
function confirmTranscript() {
  const email = S.trModalEmail;
  if (!email) return;
  const label = document.getElementById('tr-label-inp').value.trim() || 'Reunión';
  const text  = document.getElementById('tr-text-inp').value.trim();
  if (!text) return showToast('El transcript no puede estar vacío', true);
  const crm  = getCRM(email);
  const date = new Date().toLocaleDateString('es-AR', {day:'2-digit', month:'short', year:'numeric'});
  const transcripts = [...(crm.transcripts||[]), {label, date, text}];
  updateCRM(email, {transcripts});
  closeTrModal();
  renderTabContent(email);
  showToast('Transcript guardado ✓');
}
function removeTranscript(email, index) {
  const crm  = getCRM(email);
  const transcripts = (crm.transcripts||[]).filter((_,i) => i !== index);
  updateCRM(email, {transcripts});
  renderTabContent(email);
}

// ══ REUNIONES TAB ════════════════════════════════════════════════════════════
function renderReuniones() {
  return `
    <div class="reuniones-ph">
      <div class="reuniones-ph-icon">📅</div>
      <h3>Integración con Google Calendar</h3>
      <p>Próximamente vas a poder ver aquí el historial<br>de reuniones y agendar desde la app.</p>
      <div class="reuniones-tip">
        <h4>Por ahora podés:</h4>
        <p>
          • Guardar el link de Calendly en la tab <strong>Docs</strong><br>
          • Agregar el transcript de cada reunión en esa misma tab<br>
          • Anotar resúmenes y próximos pasos en Notas internas
        </p>
      </div>
    </div>`;
}

// ══ HELPERS ══════════════════════════════════════════════════════════════════
function toggleDimDetail(key) {
  const el = document.getElementById('dd-' + key);
  if (el) el.classList.toggle('open');
}
function tryParse(val, fallback) {
  if (!val || val === '' || val === 'null') return fallback;
  if (typeof val === 'object') return val;
  try { return JSON.parse(val); } catch(e) { return fallback; }
}
function scoreStyle(s) {
  if (s >= 75) return {color:'#16a34a', bg:'#dcfce7', label:'Saludable'};
  if (s >= 50) return {color:'#d97706', bg:'#fef3c7', label:'En desarrollo'};
  if (s >= 25) return {color:'#dc2626', bg:'#fee2e2', label:'Crítico'};
  return {color:'#6b7280', bg:'#f3f4f6', label:'Sin datos'};
}
function initials(name) {
  if (!name) return '?';
  return name.split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase();
}
function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showToast(msg, isErr = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isErr ? '#dc2626' : '#1b2340';
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = '0', 3500);
}
</script>
